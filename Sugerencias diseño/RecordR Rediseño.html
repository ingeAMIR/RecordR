<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>RecordR — Rediseño</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body { background: #07090b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Design canvas -->
  <script type="text/babel" src="design-canvas.jsx"></script>

  <!-- Components -->
  <script type="text/babel" src="components/atoms.jsx"></script>
  <script type="text/babel" src="components/HomeScreen.jsx"></script>
  <script type="text/babel" src="components/MatchesScreen.jsx"></script>
  <script type="text/babel" src="components/MatchDetailScreen.jsx"></script>
  <script type="text/babel" src="components/PlayersScreen.jsx"></script>
  <script type="text/babel" src="components/ListsScreen.jsx"></script>
  <script type="text/babel" src="components/ProfileScreen.jsx"></script>

  <!-- App -->
  <script type="text/babel">
    const { useState } = React;

    const App = () => (
      <DesignCanvas
        title="RecordR — Rediseño editorial"
        subtitle="Misma paleta neón verde · sistema editorial · más densidad, menos ruido. Pasa el cursor sobre cualquier pantalla y haz click para enfocar."
      >
        <DCSection id="screens" title="Pantallas principales">
          <DCArtboard id="home" label="Home" width={1280} height={2400}>
            <HomeScreen />
          </DCArtboard>
          <DCArtboard id="matches" label="Partidos" width={1280} height={1600}>
            <MatchesScreen />
          </DCArtboard>
          <DCArtboard id="match-detail" label="Detalle de partido" width={1280} height={1900}>
            <MatchDetailScreen />
          </DCArtboard>
          <DCArtboard id="players" label="Jugadores" width={1280} height={1700}>
            <PlayersScreen />
          </DCArtboard>
          <DCArtboard id="lists" label="Listas" width={1280} height={1500}>
            <ListsScreen />
          </DCArtboard>
          <DCArtboard id="profile" label="Perfil" width={1280} height={1500}>
            <ProfileScreen />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
