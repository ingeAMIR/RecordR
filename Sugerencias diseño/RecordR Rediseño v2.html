<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>RecordR — Rediseño v2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-v2.css">
  <style> html, body { background: #07090b; } </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel" src="components-v2/NavbarV2.jsx"></script>
  <script type="text/babel" src="components-v2/HomeScreenV2.jsx"></script>
  <script type="text/babel" src="components-v2/MatchesScreenV2.jsx"></script>
  <script type="text/babel" src="components-v2/MatchDetailScreenV2.jsx"></script>
  <script type="text/babel" src="components-v2/PlayersScreenV2.jsx"></script>
  <script type="text/babel" src="components-v2/ProfileScreenV2.jsx"></script>

  <script type="text/babel">
    const App = () => (
      <DesignCanvas
        title="RecordR — Rediseño v2"
        subtitle="Mantiene gradientes, hero, partidos y jugadores del original. Adopta ticker live, match detail editorial y profile editorial. Logo y tipografía Outfit + Inter del proyecto."
      >
        <DCSection id="screens" title="Pantallas v2">
          <DCArtboard id="home" label="Home (gradientes originales + ticker)" width={1280} height={2400}>
            <HomeScreenV2 />
          </DCArtboard>
          <DCArtboard id="matches" label="Partidos (cards originales)" width={1280} height={1700}>
            <MatchesScreenV2 />
          </DCArtboard>
          <DCArtboard id="match-detail" label="Detalle de partido (editorial)" width={1280} height={2100}>
            <MatchDetailScreenV2 />
          </DCArtboard>
          <DCArtboard id="players" label="Jugadores (cards originales)" width={1280} height={1700}>
            <PlayersScreenV2 />
          </DCArtboard>
          <DCArtboard id="profile" label="Perfil (editorial)" width={1280} height={1600}>
            <ProfileScreenV2 />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
