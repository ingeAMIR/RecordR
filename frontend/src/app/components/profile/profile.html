<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card bg-dark border-secondary shadow-lg rounded-4 text-white p-4 p-md-5">
                <div class="alert alert-success mt-3" *ngIf="success">{{ success }}</div>
                
                <div class="text-center mb-4" *ngIf="authService.currentUser$ | async as user">
                    
                    <div *ngIf="!isEditing">
                        <div class="position-relative d-inline-block mb-3">
                            <img *ngIf="user.avatar; else defaultAvatar" [src]="user.avatar" alt="Avatar" 
                                 class="rounded-circle border border-3 border-primary shadow-glow" 
                                 style="width: 120px; height: 120px; object-fit: cover;">
                            <ng-template #defaultAvatar>
                                <div class="rounded-circle bg-primary text-black d-flex align-items-center justify-content-center shadow-glow mx-auto" 
                                     style="width: 120px; height: 120px; font-size: 3rem;">
                                    <i class="bi bi-person-fill"></i>
                                </div>
                            </ng-template>
                        </div>
                        <h2 class="fw-black mb-1 font-outfit">{{ user.username }}</h2>
                        <p class="text-secondary mb-4">{{ user.email }}</p>
                    </div>

                    <form *ngIf="isEditing" [formGroup]="profileForm" (ngSubmit)="saveProfile(user)" class="text-start mb-4 px-3 mt-4">
                        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control bg-dark border-secondary text-white rounded-3 shadow-none focus-primary" id="username" formControlName="username" placeholder="Username">
                            <label for="username" class="text-muted">Nombre de usuario</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control bg-dark border-secondary text-white rounded-3 shadow-none focus-primary" id="email" formControlName="email" placeholder="name@example.com">
                            <label for="email" class="text-muted">Correo electrónico</label>
                        </div>
                        <div class="mb-4">
                            <label for="avatarFile" class="form-label text-muted ms-1 mb-1">Imagen de perfil (Opcional)</label>
                            <input class="form-control bg-dark border-secondary text-white shadow-none focus-primary" type="file" id="avatarFile" (change)="onFileSelected($event)" accept="image/*">
                        </div>
                        <div class="d-grid gap-2 mb-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-glow" [disabled]="profileForm.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>Guardar Cambios
                            </button>
                        </div>
                    </form>

                    <div class="d-grid gap-3 max-w-sm mx-auto">
                        <button class="btn btn-outline-light rounded-pill fw-bold" (click)="toggleEdit(user)">
                            <i class="bi" [ngClass]="isEditing ? 'bi-x-lg' : 'bi-pencil'"></i> 
                            {{ isEditing ? 'Cancelar Edición' : 'Editar Perfil' }}
                        </button>
                        <button class="btn btn-danger rounded-pill fw-bold" (click)="logout()" *ngIf="!isEditing">
                            <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                        </button>
                    </div>

                </div>

                <div class="text-center py-5" *ngIf="!(authService.currentUser$ | async)">
                    <p class="text-secondary">No has iniciado sesión o la sesión ha expirado.</p>
                    <a routerLink="/login" class="btn btn-primary rounded-pill fw-bold px-4">
                        Iniciar Sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
